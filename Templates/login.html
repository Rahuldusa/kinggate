{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bill Manager - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: url('https://png.pngtree.com/background/20211217/original/pngtree-geometric-pattern-white-gold-minimalist-creative-background-picture-image_1575961.jpg') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Login card */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 60px 32px 40px; 
            border-radius: 24px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        
        .logo {
            width: 90px;
            height: 90px;
            background: #ffffff; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .logo img {
            width: 70%;
            height: auto;
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .form-control {
            height: 52px;
            border-radius: 12px;
            padding-left: 50px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group-custom i {
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
            z-index: 3;
        }

        .btn-login {
            height: 52px;
            border-radius: 12px;
            background: #2563eb;
            border: none;
            font-weight: 600;
            font-size: 16px;
        }

        .btn-login:hover {
            background: #1d4ed8;
        }

        .demo-note {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-top: 28px;
        }
    </style>
</head>
<body>

    <div class="login-card">

      
        <div class="logo">
            <img src="{% static 'images/logo.jpeg' %}" alt="King Gate Group Logo">
        </div>

        <div class="title">Bill Manager</div>
        <div class="subtitle">Sign in to your account</div>

        {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="input-group-custom">
                <i class="bi bi-person"></i>
                <input type="text" class="form-control" name="username" id="username" placeholder="Username" required>
            </div>

            <div class="input-group-custom">
                <i class="bi bi-lock"></i>
                <input type="password" class="form-control" name="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-login w-100 text-white">
                Sign In
            </button>

           
        </form>
    <p class="demo-note mt-3">
            <a href="{% url 'forgot_password' %}">Forgot Password?</a>
        </p>
    </div>

</body>
<script>
    setTimeout(function () {
        const alerts = document.querySelectorAll('.auto-dismiss');
        alerts.forEach(function (alert) {
            const bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 3000);
</script>
</html>
